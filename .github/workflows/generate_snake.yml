name: Generate Snake

on:
  # Executa automaticamente todos os dias às 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Permite executar manualmente a partir da aba Actions
  workflow_dispatch:
  # Executa a cada push na branch principal (opcional, para testes)
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Gera o jogo da cobra (snake game) a partir do gráfico de contribuições do usuário
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Gera a imagem com o tema do Pac-Man (snake)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Faz o deploy do arquivo gerado para uma branch separada (output)
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
