name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG
        run: |
          FILE=$(ls dist/*.svg | head -n 1)
          mv "$FILE" pacman.svg

      - name: Apply White Neon Maze Theme
        run: |
          FILE="pacman.svg"

          # 1. Fundo Preto Absoluto
          sed -i 's/background-color:[^;"]*/background-color:#000000/g' $FILE
          sed -i 's/<svg/<svg style="background-color:#000000"/g' $FILE

          # 2. Transforma os quadrados em "Ocos" com bordas Brancas
          # Remove qualquer cor interna e coloca a borda branca fina
          sed -i 's/fill="[^"]*"/fill="none"/g' $FILE
          sed -i 's/<rect /<rect stroke="#ffffff" stroke-width="0.2" stroke-opacity="0.4" /g' $FILE

          # 3. Restaura as cores sólidas dos Personagens (Pacman e Fantasmas)
          # Sem isso, eles também ficariam transparentes/brancos
          
          # Pac-man Amarelo Original
          sed -i 's/fill="none"[^>]*\(.*\)#FFD700/fill="#FFFF00" stroke="none"/g' $FILE
          sed -i 's/fill="yellow"/fill="#FFFF00" stroke="none"/g' $FILE

          # Blinky (Vermelho)
          sed -i 's/fill="none"[^>]*\(.*\)#ff4cff/fill="#FF0000" stroke="none"/g' $FILE
          # Pinky (Rosa)
          sed -i 's/fill="none"[^>]*\(.*\)#7a5cff/fill="#FF69B4" stroke="none"/g' $FILE
          # Inky (Ciano)
          sed -i 's/fill="none"[^>]*\(.*\)#00ffff/fill="#00FFFF" stroke="none"/g' $FILE
          # Clyde (Laranja)
          sed -i 's/fill="none"[^>]*\(.*\)#ffa500/fill="#FF8C00" stroke="none"/g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "style: grid branco com fundo preto" || echo "no changes"
          git push origin output --force
