name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG
        run: |
          FILE=$(ls dist/*.svg | head -n 1)
          mv "$FILE" pacman.svg

      - name: Apply dark theme + maze effect
        run: |
          FILE="pacman.svg"

          # Fundo escuro
          sed -i 's/<svg/<svg style="background-color:#0d1117"/g' $FILE

          # Grid escuro base
          sed -i 's/fill="[^"]*"/fill="#161b22"/g' $FILE

          # --- PACMAN (mantém amarelo) ---
          sed -i 's/#00ffff/#FFD700/g' $FILE
          sed -i 's/yellow/#FFD700/g' $FILE

          # --- FANTASMAS (cores neon leves) ---
          sed -i 's/#ff0000/#ff4cff/g' $FILE
          sed -i 's/#00ff00/#00ffff/g' $FILE
          sed -i 's/#0000ff/#7a5cff/g' $FILE

          # --- CRIA GRID/LABIRINTO ---
          sed -i 's/<rect /<rect stroke="#1f6feb" stroke-width="0.5" /g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "update pacman maze style" || echo "no changes"
          git push origin output --force
