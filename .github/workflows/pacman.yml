name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:

# Adiciona permissões explícitas para evitar o erro de permissão (exit code 4)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve o aviso de depreciação
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Gera a animação baseada nas suas contribuições reais
      - name: Generate Pacman Animation
        uses: Platane/snk@v3
        with:
          github_user_name: jjeanpedro03
          outputs: |
            dist/pacman.svg?color_snake=#FFFF00&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9&palette=github-dark

      - name: Apply Neon Style (Customization)
        run: |
          FILE="dist/pacman.svg"
          # Força o fundo preto e as linhas brancas finas no grid
          sed -i 's/background-color:[^;"]*/background-color:#000000/g' $FILE
          sed -i 's/stroke="[^"]*"/stroke="#ffffff" stroke-width="0.1" stroke-opacity="0.4"/g' $FILE
          # Garante que o Pacman (Snake) continue amarelo
          sed -i 's/fill="#FFFF00"/fill="#FFFF00" stroke="none"/g' $FILE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
