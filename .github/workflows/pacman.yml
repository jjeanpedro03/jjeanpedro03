name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG
        run: |
          FILE=$(ls dist/*.svg | head -n 1)
          mv "$FILE" pacman.svg

      - name: Apply High Contrast White Grid
        run: |
          FILE="pacman.svg"

          # 1. Limpeza Total e Fundo Preto
          # Remove estilos inline e define o fundo como preto puro
          sed -i 's/<svg/<svg style="background-color:#000000"/g' $FILE
          
          # 2. Transforma os quadrados em linhas brancas puras e "secas"
          # Remove o preenchimento (fill) e qualquer arredondamento (rx/ry) que causa o efeito de gelatina
          sed -i 's/fill="[^"]*"/fill="none"/g' $FILE
          sed -i 's/rx="[^"]*"/rx="0"/g' $FILE
          sed -i 's/ry="[^"]*"/ry="0"/g' $FILE
          
          # Aplica a borda branca com opacidade alta para ficar bem clara
          sed -i 's/<rect /<rect stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.9" /g' $FILE

          # 3. Identifica e restaura os Personagens (Pacman e Fantasmas)
          # Aqui devolvemos o preenchimento sólido apenas para eles
          
          # Pac-man (Amarelo)
          sed -i 's/fill="none"[^>]*#FFD700/fill="#FFFF00" stroke="none"/g' $FILE
          sed -i 's/fill="none"[^>]*yellow/fill="#FFFF00" stroke="none"/g' $FILE

          # Blinky (Vermelho)
          sed -i 's/fill="none"[^>]*#ff0000/fill="#FF0000" stroke="none"/g' $FILE
          sed -i 's/fill="none"[^>]*#ff4cff/fill="#FF0000" stroke="none"/g' $FILE
          
          # Pinky (Rosa)
          sed -i 's/fill="none"[^>]*#7a5cff/fill="#FF69B4" stroke="none"/g' $FILE
          
          # Inky (Ciano)
          sed -i 's/fill="none"[^>]*#00ffff/fill="#00FFFF" stroke="none"/g' $FILE
          
          # Clyde (Laranja)
          sed -i 's/fill="none"[^>]*#ffa500/fill="#FF8C00" stroke="none"/g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "style: grid branco nitido e fundo preto" || echo "no changes"
          git push origin output --force
