name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Gera a animação baseada nos seus commits reais
      - name: Generate Pacman Animation
        uses: Platane/snk@v3
        with:
          github_user_name: jjeanpedro03
          outputs: |
            dist/pacman.svg?color_snake=#FFFF00&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9&palette=github-dark

      # 2. Deixa o visual igual ao da foto (Linhas Brancas + Fundo Preto)
      - name: Customize SVG Style
        run: |
          FILE="dist/pacman.svg"
          # Fundo preto absoluto
          sed -i 's/<svg/<svg style="background-color:#000000"/g' $FILE
          # Remove o preenchimento dos quadrados (deixa transparente)
          sed -i 's/fill="[^"]*"/fill="none"/g' $FILE
          # Tira o arredondado (efeito gelatina) e coloca a borda branca fina
          sed -i 's/rx="[^"]*"/rx="0"/g' $FILE
          sed -i 's/ry="[^"]*"/ry="0"/g' $FILE
          sed -i 's/<rect /<rect stroke="#ffffff" stroke-width="0.1" stroke-opacity="1" /g' $FILE
          # Devolve a cor amarela apenas para o Pac-Man
          sed -i 's/fill="none"[^>]*#FFFF00/fill="#FFFF00" stroke="none"/g' $FILE

      # 3. Salva o resultado na branch 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
