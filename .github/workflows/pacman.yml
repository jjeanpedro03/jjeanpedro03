name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG
        run: |
          FILE=$(ls dist/*.svg | head -n 1)
          mv "$FILE" pacman.svg

      - name: Apply Neon Maze Theme
        run: |
          FILE="pacman.svg"

          # 1. Ajusta o fundo para preto absoluto
          sed -i 's/background-color:[^;"]*/background-color:#000000/g' $FILE
          sed -i 's/<svg/<svg style="background-color:#000000"/g' $FILE

          # 2. Transforma os quadrados do fundo em preto (remove o ciano)
          # e adiciona a borda roxa/azul para criar o efeito de labirinto
          sed -i 's/fill="[^"]*"/fill="#000000"/g' $FILE
          sed -i 's/<rect /<rect stroke="#8A2BE2" stroke-width="0.4" stroke-opacity="0.8" /g' $FILE

          # 3. Restaura o Pac-man para Amarelo Brilhante
          # (O gerador costuma usar essas tags para o herói)
          sed -i 's/fill="#FFD700"/fill="#FFFF00"/g' $FILE
          sed -i 's/fill="yellow"/fill="#FFFF00"/g' $FILE

          # 4. Define as cores originais dos Fantasmas (Cores vibrantes)
          # Blinky (Vermelho)
          sed -i 's/fill="#ff4cff"/fill="#FF0000"/g' $FILE
          # Pinky (Rosa)
          sed -i 's/fill="#7a5cff"/fill="#FF69B4"/g' $FILE
          # Inky (Ciano/Azul claro)
          sed -i 's/fill="#00ffff"/fill="#00FFFF"/g' $FILE
          # Clyde (Laranja)
          sed -i 's/fill="#ffa500"/fill="#FF8C00"/g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "feat: labirinto neon estilo retro" || echo "no changes"
          git push origin output --force
