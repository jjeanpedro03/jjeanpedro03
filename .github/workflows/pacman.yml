name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG (safe)
        run: |
          if [ -d "dist" ]; then
            FILE=$(ls dist/*.svg | head -n 1)
            mv "$FILE" pacman.svg
          else
            echo "dist folder not found"
            exit 1
          fi

      - name: Apply neon maze theme
        run: |
          FILE="pacman.svg"

          # Fundo escuro (GitHub dark)
          sed -i 's/#ffffff/#0d1117/g' $FILE

          # Grid vazio (sem commits)
          sed -i 's/#ebedf0/#161b22/g' $FILE

          # Caminhos (simulando labirinto neon)
          sed -i 's/#9be9a8/#00ffff/g' $FILE
          sed -i 's/#40c463/#00ccff/g' $FILE
          sed -i 's/#30a14e/#0099ff/g' $FILE
          sed -i 's/#216e39/#0066ff/g' $FILE

          # Pac-Man (ciano neon)
          sed -i 's/yellow/#00ffff/g' $FILE

          # Fantasmas (cores vibrantes)
          sed -i 's/#ff0000/#ff00ff/g' $FILE
          sed -i 's/#00ff00/#00ffff/g' $FILE
          sed -i 's/#0000ff/#ff4cff/g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "update pacman neon" || echo "no changes"
          git push origin output --force
