name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: jjeanpedro03

      - name: Move and rename SVG
        run: |
          FILE=$(ls dist/*.svg | head -n 1)
          mv "$FILE" pacman.svg

      - name: Apply Strict White Grid Theme
        run: |
          FILE="pacman.svg"

          # 1. Forçar fundo preto no SVG e remover preenchimento de todos os retângulos
          # Isso limpa os quadradinhos ciano de uma vez por todas
          sed -i 's/<svg/<svg style="background-color:#000000"/g' $FILE
          sed -i 's/fill="[^"]*"/fill="none"/g' $FILE
          
          # 2. Aplicar a borda branca (grid) em todos os retângulos
          sed -i 's/<rect /<rect stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.3" /g' $FILE

          # 3. Localizar os personagens pelas cores originais e devolver o preenchimento (fill)
          # Pac-man (Amarelo)
          sed -i 's/none"[^>]*#FFD700/yellow" stroke="none"/g' $FILE
          sed -i 's/none"[^>]*yellow/yellow" stroke="none"/g' $FILE

          # Fantasmas (Cores vibrantes)
          # Blinky (Vermelho)
          sed -i 's/none"[^>]*#ff0000/#FF0000" stroke="none"/g' $FILE
          sed -i 's/none"[^>]*#ff4cff/#FF0000" stroke="none"/g' $FILE
          
          # Pinky (Rosa)
          sed -i 's/none"[^>]*#7a5cff/#FF69B4" stroke="none"/g' $FILE
          
          # Inky (Ciano)
          sed -i 's/none"[^>]*#00ffff/#00FFFF" stroke="none"/g' $FILE
          
          # Clyde (Laranja)
          sed -i 's/none"[^>]*#ffa500/#FF8C00" stroke="none"/g' $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout -B output
          git add pacman.svg
          git commit -m "style: grid branco minimalista" || echo "no changes"
          git push origin output --force
